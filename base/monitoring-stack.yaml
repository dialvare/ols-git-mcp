---
apiVersion: monitoring.rhobs/v1alpha1
kind: MonitoringStack
metadata:
  name: git-apps-monitoring
  namespace: git-apps
spec:
  logLevel: info
  retention: 1d
  resourceSelector:
    matchLabels:
      app: sample-app-mcp
  prometheusConfig:
    replicas: 1
  alertmanagerConfig:
    replicas: 1
