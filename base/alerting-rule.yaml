---
apiVersion: monitoring.rhobs/v1
kind: PrometheusRule
metadata:
  name: sample-app-mcp-alerts
  namespace: git-apps
  labels:
    prometheus: k8s
    role: alert-rules
spec:
  groups:
    - name: sample-app-mcp.rules
      interval: 30s
      rules:
        - alert: PodNotScheduled
          expr: |
            kube_pod_status_phase{namespace="git-apps", phase="Pending"} == 1
            and
            kube_pod_status_scheduled{namespace="git-apps", condition="false"} == 1
          for: 2m
          labels:
            severity: warning
            component: sample-app-mcp
            incident: "true"
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} cannot be scheduled"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been in Pending state for more than 2 minutes due to scheduling issues."
            runbook_url: "https://github.com/dialvare/ols-git-mcp"

        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="git-apps"}[10m]) * 600 > 3
          for: 5m
          labels:
            severity: critical
            component: sample-app-mcp
            incident: "true"
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted {{ $value }} times in the last 10 minutes."

        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{namespace="git-apps", condition="false"} == 1
          for: 3m
          labels:
            severity: warning
            component: sample-app-mcp
            incident: "true"
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not ready"
            description: "Pod {{ $labels.pod }} has been in a non-ready state for more than 3 minutes."
