apiVersion: project.openshift.io/v1
kind: Project
metadata:
  name: git-apps
  labels:
    openshift.io/cluster-monitoring: "true"
    app.kubernetes.io/part-of: sample-app-mcp
    argocd.argoproj.io/managed-by: "openshift-gitops"
---
apiVersion: v1
kind: Pod
metadata:
 name: sample-app-mcp
 namespace: git-apps
 labels:
   app: sample-app-mcp
   app.kubernetes.io/name: sample-app-mcp
 annotations:
   app.github.com/repo-url: "https://github.com/dialvare/ols-git-mcp"
   app.openshift.io/vcs-ref: "main"
   app.openshift.io/vcs-path: "base/sample-app-mcp.yaml"
   app.kubernetes.io/kustomize-base: "base"
   app.kubernetes.io/kustomize-overlay: "overlays/prod"
spec:
 containers:
 - image: quay.io/sclorg/httpd-24-micro-c9s
   imagePullPolicy: IfNotPresent
   name: broken-container
   ports:
   - containerPort: 8080
     protocol: TCP
   resources: {}
   securityContext:
     allowPrivilegeEscalation: false
     capabilities:
       drop:
       - ALL
     runAsNonRoot: true
   terminationMessagePath: /dev/termination-log
   terminationMessagePolicy: File
 dnsPolicy: ClusterFirst
 enableServiceLinks: true
 nodeSelector:
   node-role.kubernetes.io/wrker: ""
 preemptionPolicy: PreemptLowerPriority
 priority: 0
 restartPolicy: Always
 schedulerName: default-scheduler
 securityContext:
   seccompProfile:
     type: RuntimeDefault
 serviceAccount: default
 serviceAccountName: default
 terminationGracePeriodSeconds: 30
 tolerations:
 - effect: NoExecute
   key: node.kubernetes.io/not-ready
   operator: Exists
   tolerationSeconds: 300
 - effect: NoExecute
   key: node.kubernetes.io/unreachable
   operator: Exists
   tolerationSeconds: 300
