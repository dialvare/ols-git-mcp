apiVersion: v1
kind: Pod
metadata:
 name: sample-app-mcp
 namespace: git-apps
 labels:
   app: sample-app-mcp
   app.kubernetes.io/name: sample-app-mcp
   environment: production
   managed-by: gitops
 annotations:
   app.github.com/repo-url: "https://github.com/dialvare/ols-git-mcp"
   app.openshift.io/vcs-ref: "main"
   app.openshift.io/vcs-path: "manifests/sample-app-mcp.yaml"
   app.kubernetes.io/part-of: "sample-app-mcp"
   app.kubernetes.io/managed-by: "argocd"
   argocd.argoproj.io/instance: "sample-app"
   argocd.argoproj.io/sync-options: Replace=true
spec:
 containers:
 - image: quay.io/sclorg/httpd-24-micro-c9s
   imagePullPolicy: IfNotPresent
   name: broken-container
   ports:
   - containerPort: 8080
     protocol: TCP
   resources: {}
   securityContext:
     allowPrivilegeEscalation: false
     capabilities:
       drop:
       - ALL
     runAsNonRoot: true
   terminationMessagePath: /dev/termination-log
   terminationMessagePolicy: File
 dnsPolicy: ClusterFirst
 enableServiceLinks: true
 nodeSelector:
   node-role.kubernetes.io/worker: ""
 preemptionPolicy: PreemptLowerPriority
 priority: 0
 restartPolicy: Always
 schedulerName: default-scheduler
 securityContext:
   seccompProfile:
     type: RuntimeDefault
 serviceAccount: default
 serviceAccountName: default
 terminationGracePeriodSeconds: 30
 tolerations:
 - effect: NoExecute
   key: node.kubernetes.io/not-ready
   operator: Exists
   tolerationSeconds: 300
 - effect: NoExecute
   key: node.kubernetes.io/unreachable
   operator: Exists
   tolerationSeconds: 300
