apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-app
  namespace: openshift-gitops
  labels:
    argocd.argoproj.io/instance: openshift-gitops
spec:
  project: default
  source:
    repoURL: 'https://github.com/dialvare/ols-git-mcp'
    targetRevision: main
    path: manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: git-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
